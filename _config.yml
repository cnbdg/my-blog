# Hexo 基础配置
## 文档地址: https://hexo.io/docs/configuration.html

# 1. 网站基础信息 (Site)
title: cndbg的博客            # 网站标题（显示在浏览器标签栏和首页）
subtitle: '您好，欢迎光临'      # 网站副标题（通常显示在标题下方）
description: '记录生活的点点滴滴' # 网站描述（对 SEO 搜索引擎优化很重要哦！）
keywords:                     # 网站关键词（用英文逗号隔开）
author: ShuFANG Xiao          # 作者名字
language: zh-CN               # 网站语言（zh-CN 表示简体中文）
timezone: ''                  # 时区（留空默认使用电脑本地时区）

# 2. 网址设置 (URL)
## 如果你使用 GitHub Pages，请务必填入你的域名
url: https://xsf.ndjp.net     # 你的博客网址
permalink: :title.html        # 文章链接格式（现在是：标题.html）
permalink_defaults:           # 链接默认值
pretty_urls:                  # 链接优化
  trailing_index: true        # 是否保留链接末尾的 'index.html'
  trailing_html: true         # 是否保留链接末尾的 '.html'

# 3. 目录设置 (Directory)
source_dir: source            # 资源文件夹（存放你的 Markdown 文章）
public_dir: public            # 生成静态网页的文件夹
tag_dir: tags                 # 标签页目录
archive_dir: archives         # 归档页目录
category_dir: categories      # 分类页目录
code_dir: downloads/code      # 代码块下载目录
i18n_dir: :lang               # 国际化文件夹
skip_render:                  # 跳过渲染的文件/文件夹

# 4. 文章写作设置 (Writing)
new_post_name: :title.md      # 新文章的文件名格式
default_layout: post          # 默认布局（通常是 post）
titlecase: false              # 是否将标题自动转为首字母大写
external_link:                # 外部链接设置
  enable: true                # 是否在新标签页打开外部链接
  field: site                 # 应用范围
  exclude: ''                 # 排除的域名
filename_case: 0              # 文件名大小写转换（0不变，1小写，2大写）
render_drafts: false          # 是否渲染草稿箱里的文章
post_asset_folder: false      # 是否开启资源文件夹（存图片很方便！）
relative_link: false          # 是否使用相对链接
future: true                  # 是否显示发布日期晚于当前日期的文章
syntax_highlighter: highlight.js # 代码高亮工具

# 5. 代码高亮设置 (Highlight.js)
highlight:
  line_number: true           # 是否显示行号
  auto_detect: false          # 是否自动检测语言类型
  tab_replace: ''             # 缩进替换
  wrap: true                  # 是否自动换行
  hljs: false                 # 是否直接使用 CSS 类名

# 6. 首页设置 (Home page setting)
index_generator:
  path: ''                    # 首页路径
  per_page: 10                # 首页每页显示多少篇文章
  order_by: -date             # 排序方式（-date 表示按日期倒序，最新在最前）

# 7. 日期/时间格式 (Date / Time format)
date_format: YYYY-MM-DD       # 日期显示格式（年-月-日）
time_format: HH:mm:ss         # 时间显示格式（时:分:秒）
updated_option: 'mtime'       # 文章更新时间（mtime 表示根据文件修改时间自动更新）

# 8. 分页设置 (Pagination)
per_page: 10                  # 全站每页显示的文章数
pagination_dir: page          # 分页目录名称

# 9. 扩展与主题 (Extensions)
theme: fluid                  # 当前正在使用的主题：Fluid

# 10. 部署设置 (Deployment)
## 每次执行 hexo d 时的推送到哪里
deploy:
  type: ''                    # 部署类型（如 git）